<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>An Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0c12;
    --ink-2:#11141d;
    --gold:#d2a85a;
    --gold-bright:#f0c878;
    --ember:#c8553d;
    --paper:#ece6d8;
    --paper-dim:#bdb6a4;
    --line: rgba(210,168,90,0.25);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0; height:100%;
    background:var(--ink);
    overflow:hidden;
  }

  body{
    font-family:'Inter', sans-serif;
    color:var(--paper);
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
  }

  /* ---------- ambient backdrop: slow drifting stars / embers ---------- */
  #sky{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(210,168,90,0.10), transparent 60%),
      radial-gradient(ellipse 70% 50% at 90% 110%, rgba(200,85,61,0.08), transparent 60%),
      var(--ink);
  }

  .spark{
    position:absolute;
    width:2px; height:2px;
    background:var(--gold);
    border-radius:50%;
    opacity:0;
    animation:twinkle 6s ease-in-out infinite;
  }

  @keyframes twinkle{
    0%,100%{ opacity:0; transform:scale(1); }
    50%{ opacity:0.9; transform:scale(1.6); }
  }

  /* ---------- card ---------- */
  .stage{
    position:relative;
    z-index:2;
    width:min(480px, 88vw);
    padding:56px 40px 48px;
    text-align:center;
    background:linear-gradient(180deg, rgba(17,20,29,0.7), rgba(10,12,18,0.85));
    border:1px solid var(--line);
    border-radius:2px;
    box-shadow:
      0 0 0 1px rgba(210,168,90,0.06),
      0 30px 80px -20px rgba(0,0,0,0.8),
      0 0 60px -10px rgba(210,168,90,0.08);
    opacity:0;
    transform:translateY(18px);
    animation:rise 1.1s cubic-bezier(.16,1,.3,1) 0.2s forwards;
  }

  @keyframes rise{
    to{ opacity:1; transform:translateY(0); }
  }

  .ornament{
    width:46px; height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    margin:0 auto 22px;
    opacity:0;
    animation:fadeIn 1s ease 0.6s forwards;
  }

  .ornament.bottom{ margin:26px auto 0; }

  @keyframes fadeIn{ to{ opacity:1; } }

  .eyebrow{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:15px;
    letter-spacing:0.08em;
    color:var(--gold);
    opacity:0;
    animation:fadeIn 1s ease 0.8s forwards;
    margin:0 0 14px;
  }

  h1{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:clamp(28px, 6vw, 40px);
    line-height:1.15;
    margin:0 0 18px;
    color:var(--paper);
    opacity:0;
    animation:fadeIn 1s ease 1s forwards;
  }

  h1 em{
    font-style:italic;
    color:var(--gold-bright);
    font-weight:400;
  }

  p.sub{
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    line-height:1.6;
    color:var(--paper-dim);
    margin:0 0 8px;
    opacity:0;
    animation:fadeIn 1s ease 1.2s forwards;
  }

  .details{
    font-family:'Inter', sans-serif;
    font-size:12.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--paper-dim);
    margin:18px 0 0;
    opacity:0;
    animation:fadeIn 1s ease 1.35s forwards;
  }

  /* ---------- buttons ---------- */
  .actions{
    position:relative;
    margin-top:40px;
    height:64px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    opacity:0;
    animation:fadeIn 1s ease 1.55s forwards;
  }

  button{
    font-family:'Inter', sans-serif;
    border:none;
    cursor:pointer;
    border-radius:3px;
    letter-spacing:0.03em;
    transition:transform 0.2s ease, box-shadow 0.3s ease, background 0.3s ease, font-size 0.25s ease, padding 0.25s ease;
  }

  #yes{
    background:linear-gradient(180deg, var(--gold-bright), var(--gold));
    color:#1a1408;
    font-weight:600;
    font-size:15px;
    padding:14px 30px;
    box-shadow:0 8px 24px -8px rgba(210,168,90,0.5);
  }

  #yes:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px -8px rgba(240,200,120,0.6);
  }

  #yes:active{ transform:translateY(0); }

  #no{
    position:relative;
    background:transparent;
    border:1px solid rgba(189,182,164,0.35);
    color:var(--paper-dim);
    font-weight:400;
    font-size:15px;
    padding:14px 26px;
    z-index:5;
  }

  /* once it has fled at least once, mark it so we can style the chase state */
  #no.fleeing{
    position:fixed;
    transition: top 0.35s cubic-bezier(.2,.8,.2,1), left 0.35s cubic-bezier(.2,.8,.2,1), font-size 0.25s ease, padding 0.25s ease, opacity 0.25s ease, border-color 0.3s ease;
  }

  #reply{
    position:fixed;
    bottom:34px;
    left:0; right:0;
    text-align:center;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:16px;
    color:var(--gold);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.4s ease;
    z-index:1;
  }

  #reply.show{ opacity:1; }

  /* ---------- final accepted state ---------- */
  .stage.accepted .actions{ display:none; }

  .accepted-msg{
    display:none;
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:20px;
    color:var(--gold-bright);
    margin-top:36px;
  }

  .stage.accepted .accepted-msg{ display:block; animation:fadeIn 0.8s ease forwards; }
</style>
</head>
<body>

<div id="sky"></div>

<div class="stage" id="stage">
  <div class="ornament"></div>
  <p class="eyebrow">A small request</p>
  <h1>Will you let me take you<br><em>to dinner?</em></h1>
  <p class="sub">No agenda. No rush. Just good food,<br>better conversation, and a chair across from mine.</p>
  <p class="details">You choose the night</p>

  <div class="actions">
    <button id="yes">Yes, I'd love to</button>
    <button id="no">No</button>
  </div>

  <div class="accepted-msg" id="acceptedMsg"></div>
  <div class="ornament bottom"></div>
</div>

<div id="reply"></div>

<script>
(function(){
  // ---- ambient sparks ----
  const sky = document.getElementById('sky');
  for(let i=0;i<28;i++){
    const s = document.createElement('div');
    s.className = 'spark';
    s.style.left = Math.random()*100 + 'vw';
    s.style.top = Math.random()*100 + 'vh';
    s.style.animationDelay = (Math.random()*6) + 's';
    s.style.animationDuration = (4 + Math.random()*5) + 's';
    sky.appendChild(s);
  }

  const noBtn = document.getElementById('no');
  const yesBtn = document.getElementById('yes');
  const stage = document.getElementById('stage');
  const reply = document.getElementById('reply');
  const acceptedMsg = document.getElementById('acceptedMsg');

  const taunts = [
    "nice try.",
    "not happening.",
    "you'll have to be quicker.",
    "still no.",
    "getting tired yet?",
    "I admire the effort.",
    "this button has made its choice.",
    "okay, this is just exercise now."
  ];

  let dodges = 0;
  let fled = false;
  let homeTop = null;
  let homeLeft = null;
  let isHome = true;
  let returnTimer = null;

  function showReply(text){
    reply.textContent = text;
    reply.classList.add('show');
    clearTimeout(reply._t);
    reply._t = setTimeout(()=> reply.classList.remove('show'), 1600);
  }

  function goHome(){
    noBtn.style.left = homeLeft + 'px';
    noBtn.style.top = homeTop + 'px';
    isHome = true;
  }

  function dodge(){
    // ignore re-triggers while it's mid-flight back home
    if(!isHome) return;
    isHome = false;
    clearTimeout(returnTimer);

    dodges++;

    if(!fled){
      // first escape: lift it out of the layout into fixed positioning
      const r = noBtn.getBoundingClientRect();
      homeTop = r.top;
      homeLeft = r.left;
      noBtn.style.top = homeTop + 'px';
      noBtn.style.left = homeLeft + 'px';
      noBtn.classList.add('fleeing');
      fled = true;
      // force reflow so the transition applies to the next move, not this one
      void noBtn.offsetWidth;
    }

    const margin = 16;
    const w = noBtn.offsetWidth;
    const h = noBtn.offsetHeight;
    const maxX = window.innerWidth - w - margin;
    const maxY = window.innerHeight - h - margin;

    const newX = margin + Math.random() * Math.max(0, maxX - margin);
    const newY = margin + Math.random() * Math.max(0, maxY - margin);

    noBtn.style.left = newX + 'px';
    noBtn.style.top = newY + 'px';

    // shrink slightly and weaken with every escape, capped so it never disappears
    const shrink = Math.max(0.62, 1 - dodges * 0.045);
    const fontSize = Math.max(10, 15 * shrink);
    noBtn.style.fontSize = fontSize + 'px';
    noBtn.style.padding = (14*shrink) + 'px ' + (26*shrink) + 'px';
    noBtn.style.opacity = Math.max(0.45, 1 - dodges*0.05);

    const idx = Math.min(dodges - 1, taunts.length - 1);
    noBtn.textContent = dodges > 2 ? "no?" : "No";
    showReply(taunts[idx] || taunts[taunts.length-1]);

    // after a beat, it comes back to where it started, ready to flee again
    returnTimer = setTimeout(goHome, 850);
  }

  // desktop: dodge on hover approach
  noBtn.addEventListener('mouseenter', dodge);

  // mobile/touch: dodge on touchstart before the click can register, and on click as a fallback
  noBtn.addEventListener('touchstart', function(e){
    e.preventDefault();
    dodge();
  }, {passive:false});

  // safety net: if it's ever actually pressed (e.g. keyboard tab + enter), still don't let it "win"
  noBtn.addEventListener('click', function(e){
    e.preventDefault();
    dodge();
  });

  yesBtn.addEventListener('click', function(){
    const messages = [
      "Then it's settled. I'll be counting the days.",
      "Wonderful. I'll let you pick the place — surprise me.",
      "Good. I was hoping you'd say that."
    ];
    acceptedMsg.textContent = messages[Math.floor(Math.random()*messages.length)];
    stage.classList.add('accepted');
    reply.classList.remove('show');
  });
})();
</script>

</body>
</html>
